<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carte de visite – YACOUT CONSULTING</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold-light:#E2C97E;
  --dark:#0A0A0A;--white:#F5F5F0;
  --gray:#888;--gray-light:#AAAAAA;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Segoe UI',Helvetica,Arial,sans-serif;
}
body{background:#141414;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:var(--sans);padding:40px 20px;gap:28px}

.scene{perspective:1400px}
.card-wrap{width:460px;height:264px;position:relative;transform-style:preserve-3d;transition:transform .9s cubic-bezier(.4,0,.2,1);cursor:pointer}
.card-wrap.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:3px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.8)}

/* RECTO */
.front{background:linear-gradient(135deg,#0a0a0a 0%,#161616 50%,#0d0d0d 100%);border:1px solid rgba(201,168,76,0.2)}
.front::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--gold),rgba(201,168,76,0.1))}
.front::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,var(--gold),transparent 55%)}
.front-inner{position:relative;width:100%;height:100%;padding:24px 26px;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto 1fr auto;gap:0}
.f-brand{grid-column:1;grid-row:1;display:flex;flex-direction:column;gap:3px}
.f-logo-row{display:flex;align-items:center;gap:9px}
.f-logo-name{font-family:var(--serif);font-size:14px;letter-spacing:3px;color:var(--white)}
.f-logo-name em{color:var(--gold);font-style:normal}
.f-logo-sub{font-size:7.5px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-top:1px}
.f-gold-line{width:28px;height:1px;background:var(--gold);margin-top:8px}
.f-qr{grid-column:2;grid-row:1/4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding-left:20px}
.f-qr-box{padding:6px;background:#fff;border-radius:2px;box-shadow:0 0 0 1px rgba(201,168,76,0.3)}
.f-qr-label{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--gray);text-align:center}
.f-qr-url{font-size:7.5px;color:var(--gold);letter-spacing:.3px}
.f-mid{grid-column:1;grid-row:2;display:flex;flex-direction:column;justify-content:center;gap:10px;padding-top:10px}
.f-tagline{font-family:var(--serif);font-size:11px;color:var(--gray-light);font-style:italic;line-height:1.7}
.f-expertise{display:flex;flex-direction:column;gap:4px}
.f-exp-item{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--gray);display:flex;align-items:center;gap:7px}
.f-exp-item::before{content:'';width:3px;height:3px;background:var(--gold);flex-shrink:0;display:inline-block}
.f-bottom{grid-column:1;grid-row:3;display:flex;justify-content:space-between;align-items:flex-end;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.f-contacts{display:flex;flex-direction:column;gap:5px}
.f-contact{display:flex;align-items:center;gap:6px}
.f-contact svg{width:9px;height:9px;stroke:var(--gold);fill:none;stroke-width:1.8;flex-shrink:0}
.f-contact span{font-size:9.5px;color:var(--gray-light);letter-spacing:.3px}
.f-slogan{font-size:7.5px;color:rgba(201,168,76,0.5);font-style:italic;text-align:right;line-height:1.8}

/* VERSO */
.back{background:#0a0a0a;transform:rotateY(180deg);border:1px solid rgba(201,168,76,0.15)}
.back-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}
.back-glow{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(201,168,76,0.06),transparent 70%)}
.back-tl,.back-tr,.back-bl,.back-br{position:absolute;width:16px;height:16px}
.back-tl{top:13px;left:13px;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
.back-tr{top:13px;right:13px;border-top:1px solid var(--gold);border-right:1px solid var(--gold)}
.back-bl{bottom:13px;left:13px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold)}
.back-br{bottom:13px;right:13px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold)}
.logo-main{display:flex;flex-direction:column;align-items:center}
.logo-wordmark{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:8px}
.logo-wordmark-name{font-family:var(--serif);font-size:13px;letter-spacing:6px;color:var(--white)}
.logo-wordmark-name em{color:var(--gold);font-style:normal}
.logo-wordmark-line{width:40px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent)}
.logo-wordmark-sub{font-size:7px;letter-spacing:4px;text-transform:uppercase;color:rgba(201,168,76,0.5)}

/* ── CAPTURE ZONE (hors écran, pas de 3D) ── */
#capture-zone{
  position:fixed;left:-9999px;top:0;
  width:460px;
  display:flex;flex-direction:column;gap:0;
  pointer-events:none;
}
#cap-front,#cap-back{
  width:460px;height:264px;
  position:relative;overflow:hidden;
  border-radius:3px;
}

/* CONTROLS */
.controls{display:flex;flex-direction:column;align-items:center;gap:10px}
.hint{font-size:11px;color:#555;letter-spacing:1px}
.btn-row{display:flex;gap:10px}
.flip-btn{background:transparent;border:1px solid rgba(201,168,76,0.4);color:var(--gold);padding:9px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--sans);transition:all .3s}
.flip-btn:hover{background:var(--gold);color:#000}
.dl-btn{background:var(--gold);color:#000;padding:9px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--sans);border:none;font-weight:600;transition:background .3s;display:flex;align-items:center;gap:8px}
.dl-btn:hover{background:var(--gold-light)}
.info{font-size:10px;color:#444;letter-spacing:.5px;text-align:center;line-height:1.8}

/* Progress overlay */
#progress-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#progress-overlay.active{display:flex}
#progress-msg{color:var(--gold);font-size:13px;letter-spacing:2px;text-transform:uppercase}
.progress-bar-wrap{width:220px;height:2px;background:rgba(201,168,76,0.15);border-radius:1px}
.progress-bar{height:2px;background:var(--gold);border-radius:1px;transition:width .4s ease;width:0%}

#qr-hidden{position:fixed;left:-19999px;top:0}
</style>
</head>
<body>

<!-- Progress overlay -->
<div id="progress-overlay">
  <div id="progress-msg">Préparation…</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="pbar"></div></div>
</div>

<!-- QR hidden haute résolution pour capture -->
<div id="qr-hidden"></div>

<!-- ── Zone de capture flat (pas de 3D transform) ── -->
<div id="capture-zone">
  <div id="cap-front"></div>
  <div id="cap-back"></div>
</div>

<!-- Carte interactive -->
<div class="scene">
  <div class="card-wrap" id="card" onclick="this.classList.toggle('flipped')">
    <div class="face front" id="live-front"></div>
    <div class="face back" id="live-back"></div>
  </div>
</div>

<div class="controls">
  <span class="hint">↕ Cliquez sur la carte pour la retourner</span>
  <div class="btn-row">
    <button class="flip-btn" onclick="document.getElementById('card').classList.toggle('flipped')">Retourner</button>
    <button class="dl-btn" id="dlBtn" onclick="exportPDF()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Télécharger PDF
    </button>
  </div>
</div>
<div class="info">Format standard · 85 × 54 mm · Recto + Verso · Prêt à l'impression</div>

<script>
// ─────────────────────────────────────────────────────────
//  HTML DE LA CARTE (injecté dans live ET capture)
// ─────────────────────────────────────────────────────────
const FRONT_HTML = `
<div style="position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,#C9A84C,rgba(201,168,76,0.1))"></div>
<div style="position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,#C9A84C,transparent 55%)"></div>
<div class="front-inner">
  <div class="f-brand">
    <div class="f-logo-row">
      <svg width="24" height="29" viewBox="0 0 100 118" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="gF" x1="0%" y1="0%" x2="60%" y2="100%">
          <stop offset="0%" stop-color="#FDE68A"/><stop offset="30%" stop-color="#C9A84C"/>
          <stop offset="70%" stop-color="#9A7828"/><stop offset="100%" stop-color="#C9A84C"/>
        </linearGradient></defs>
        <text x="50" y="72" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="88" font-weight="600" fill="url(#gF)" letter-spacing="-8">Y</text>
        <text x="54" y="98" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="76" font-weight="600" fill="url(#gF)">C</text>
      </svg>
      <div>
        <div class="f-logo-name"><em>YACOUT</em> CONSULTING</div>
        <div class="f-logo-sub">Conseil en Financement</div>
      </div>
    </div>
    <div class="f-gold-line"></div>
  </div>
  <div class="f-qr">
    <div class="f-qr-box" id="__QR_PLACEHOLDER__"></div>
    <div class="f-qr-label">Scanner</div>
    <div class="f-qr-url">yacoutconsulting.com</div>
  </div>
  <div class="f-mid">
    <div class="f-tagline">Structuration · Optimisation · Sécurisation<br>de vos opérations de financement.</div>
    <div class="f-expertise">
      <div class="f-exp-item">Financement Structuré (Bancaire)</div>
      <div class="f-exp-item">Financements Publics &amp; Dispositifs</div>
      <div class="f-exp-item">Capital &amp; Partenariats Financiers</div>
    </div>
  </div>
  <div class="f-bottom">
    <div class="f-contacts">
      <div class="f-contact"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.61 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>+212 6XX XXX XXX</span></div>
      <div class="f-contact"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>contact@yacoutconsulting.com</span></div>
      <div class="f-contact"><svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg><span>yacoutconsulting.com</span></div>
    </div>
    <div class="f-slogan">Votre vision.<br>Notre expertise.<br>Votre financement.</div>
  </div>
</div>`;

const BACK_HTML = `
<div class="back-inner">
  <div class="back-glow"></div>
  <div class="back-tl"></div><div class="back-tr"></div>
  <div class="back-bl"></div><div class="back-br"></div>
  <div class="logo-main">
    <svg width="114" height="134" viewBox="0 0 100 118" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gB" x1="0%" y1="0%" x2="60%" y2="100%">
          <stop offset="0%" stop-color="#FDE68A"/><stop offset="30%" stop-color="#C9A84C"/>
          <stop offset="70%" stop-color="#9A7828"/><stop offset="100%" stop-color="#C9A84C"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <text x="50" y="72" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="88" font-weight="600" fill="url(#gB)" filter="url(#glow)" letter-spacing="-8">Y</text>
      <text x="54" y="98" text-anchor="middle" font-family="'Cormorant Garamond',Georgia,serif" font-size="76" font-weight="600" fill="url(#gB)" filter="url(#glow)">C</text>
    </svg>
    <div class="logo-wordmark">
      <div class="logo-wordmark-name"><em>YACOUT</em> CONSULTING</div>
      <div class="logo-wordmark-line"></div>
      <div class="logo-wordmark-sub">Conseil en Financement</div>
    </div>
  </div>
</div>`;

// ─────────────────────────────────────────────────────────
//  Styles inline pour les conteneurs de capture
// ─────────────────────────────────────────────────────────
const FRONT_STYLES = `
  background:linear-gradient(135deg,#0a0a0a 0%,#161616 50%,#0d0d0d 100%);
  border:1px solid rgba(201,168,76,0.2);
`;
const BACK_STYLES = `
  background:#0a0a0a;
  border:1px solid rgba(201,168,76,0.15);
`;

// ─────────────────────────────────────────────────────────
//  Génération QR → DataURL
// ─────────────────────────────────────────────────────────
let qrDataURL = null;

function buildQR(containerId, size) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  return new Promise(resolve => {
    new QRCode(el, {
      text: 'https://yacoutconsulting.com/',
      width: size, height: size,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    setTimeout(() => {
      const cvs = el.querySelector('canvas');
      const img = el.querySelector('img');
      if (cvs) resolve(cvs.toDataURL('image/png'));
      else if (img) resolve(img.src);
      else resolve(null);
    }, 400);
  });
}

// QR visible dans la carte live
async function initLiveCard() {
  // Inject front HTML into live card
  const lf = document.getElementById('live-front');
  lf.style.cssText = FRONT_STYLES;
  lf.innerHTML = FRONT_HTML.replace('id="__QR_PLACEHOLDER__"', 'id="qr-live"');

  const lb = document.getElementById('live-back');
  lb.style.cssText = BACK_STYLES;
  lb.innerHTML = BACK_HTML;

  // QR in live card (small)
  await buildQR('qr-live', 72);

  // QR haute résolution pour capture
  qrDataURL = await buildQR('qr-hidden', 300);
}

initLiveCard();

// ─────────────────────────────────────────────────────────
//  Préparer les conteneurs de capture avec QR haute-def
// ─────────────────────────────────────────────────────────
async function prepareCaptureZone() {
  // FRONT
  const cf = document.getElementById('cap-front');
  cf.style.cssText = FRONT_STYLES + 'width:460px;height:264px;position:relative;overflow:hidden;border-radius:3px;';
  cf.innerHTML = FRONT_HTML.replace('id="__QR_PLACEHOLDER__"', 'id="qr-cap"');

  // Inject le QR haute-def dans le conteneur de capture
  const qrCapBox = document.getElementById('qr-cap');
  qrCapBox.innerHTML = '';
  if (qrDataURL) {
    const img = document.createElement('img');
    img.src = qrDataURL;
    img.style.cssText = 'width:72px;height:72px;display:block;';
    qrCapBox.appendChild(img);
  }

  // BACK
  const cb = document.getElementById('cap-back');
  cb.style.cssText = BACK_STYLES + 'width:460px;height:264px;position:relative;overflow:hidden;border-radius:3px;';
  cb.innerHTML = BACK_HTML;

  // Attendre que les fonts soient prêtes
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 200));
}

// ─────────────────────────────────────────────────────────
//  EXPORT PDF — html2canvas → jsPDF
// ─────────────────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('progress-msg').textContent = msg;
}

async function exportPDF() {
  const overlay = document.getElementById('progress-overlay');
  overlay.classList.add('active');
  setProgress(5, 'Préparation de la carte…');

  try {
    // Préparer les éléments de capture
    await prepareCaptureZone();
    setProgress(20, 'Rendu recto…');

    const capFront = document.getElementById('cap-front');
    const capBack  = document.getElementById('cap-back');

    // Options html2canvas communes
    const h2cOpts = {
      scale: 4,           // 4× = haute résolution (≈ 300 dpi pour 85mm)
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      logging: false,
      imageTimeout: 0,
    };

    // Capture recto
    const canvasFront = await html2canvas(capFront, h2cOpts);
    setProgress(55, 'Rendu verso…');

    // Capture verso
    const canvasBack = await html2canvas(capBack, h2cOpts);
    setProgress(80, 'Génération du PDF…');

    // ── Construire le PDF ──
    const { jsPDF } = window.jspdf;
    const W = 85, H = 54; // mm standard carte de visite

    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: [W, H],
      compress: true
    });

    // Page 1 – Recto
    const frontDataUrl = canvasFront.toDataURL('image/jpeg', 0.97);
    pdf.addImage(frontDataUrl, 'JPEG', 0, 0, W, H, '', 'FAST');

    // Page 2 – Verso
    pdf.addPage([W, H], 'landscape');
    const backDataUrl = canvasBack.toDataURL('image/jpeg', 0.97);
    pdf.addImage(backDataUrl, 'JPEG', 0, 0, W, H, '', 'FAST');

    setProgress(98, 'Enregistrement…');
    await new Promise(r => setTimeout(r, 300));

    pdf.save('YACOUT_CONSULTING_carte-de-visite.pdf');

    setProgress(100, 'Terminé ✓');
    await new Promise(r => setTimeout(r, 600));

  } catch(err) {
    console.error('Export error:', err);
    setProgress(100, 'Erreur – voir console');
    await new Promise(r => setTimeout(r, 1500));
  }

  overlay.classList.remove('active');
}
</script>
</body>
</html>
